<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Academia — Administración SICE</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f6f8; color: #333; min-height: 100vh; }
    .header {
      background: linear-gradient(135deg, #6A2135 0%, #3a121d 100%);
      color: white;
      padding: 14px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header h1 { font-size: 1.25rem; margin-bottom: 2px; }
    .badge-ro {
      display: inline-block;
      background: rgba(255,152,0,0.25);
      color: #ffcc80;
      border: 1px solid rgba(255,152,0,0.4);
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 0.7rem;
    }
    .header-right { display: flex; align-items: center; gap: 12px; }
    .user-name { font-size: 0.85rem; opacity: 0.85; }
    .btn-back {
      background: rgba(255,255,255,0.15);
      color: white;
      border: 1px solid rgba(255,255,255,0.3);
      padding: 7px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.85rem;
      transition: background 0.2s;
    }
    .btn-back:hover { background: rgba(255,255,255,0.25); }
    .content { max-width: 1100px; margin: 24px auto; padding: 0 20px 40px; }
    .card {
      background: white;
      border-radius: 12px;
      padding: 20px 24px;
      margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
    }
    .card h2 { font-size: 1.05rem; color: #6A2135; margin-bottom: 14px; font-weight: 600; }
    .academia-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 16px;
    }
    .academia-card {
      background: #fff;
      border: 1.5px solid #eee;
      border-radius: 10px;
      padding: 18px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .academia-card:hover {
      border-color: #6A2135;
      box-shadow: 0 4px 12px rgba(106,33,53,0.12);
      transform: translateY(-2px);
    }
    .academia-card h3 { font-size: 1rem; color: #333; margin-bottom: 6px; }
    .academia-card .badge-n {
      display: inline-block;
      background: #f3e5f5;
      color: #7b1fa2;
      padding: 2px 10px;
      border-radius: 20px;
      font-size: 0.78rem;
      margin-top: 6px;
    }
    table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    thead th { background: #6A2135; color: white; padding: 10px 12px; text-align: left; font-weight: 600; }
    tbody td { padding: 9px 12px; border-bottom: 1px solid #eee; vertical-align: middle; }
    tbody tr:hover { background: #fdf5f6; }
    tbody tr:last-child td { border-bottom: none; }
    .btn-ver {
      background: #6A2135;
      color: white;
      border: none;
      padding: 5px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.82rem;
    }
    .btn-ver:hover { background: #4a1525; }
    .btn-volver {
      background: #eee;
      color: #555;
      border: none;
      padding: 7px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.85rem;
      margin-bottom: 16px;
    }
    .btn-volver:hover { background: #ddd; }
    .sin-datos { text-align: center; padding: 30px; color: #999; }
    .prom-aprobado { color: #2e7d32; font-weight: 600; }
    .prom-reprobado { color: #c62828; font-weight: 600; }
    .prom-np { color: #e65100; font-weight: 600; }
  </style>
</head>
<body>
  <div class="header">
    <div>
      <h1>Academia</h1>
      <span class="badge-ro">Solo lectura</span>
    </div>
    <div class="header-right">
      <span class="user-name" id="userName"></span>
      <button class="btn-back" onclick="window.location.href='./administracion.html'">← Inicio</button>
    </div>
  </div>

  <div class="content">
    <!-- Lista de academias -->
    <div id="seccionAcademias">
      <div class="card">
        <h2>Academias registradas</h2>
        <div id="listaAcademias"><p style="color:#999;">Cargando...</p></div>
      </div>
    </div>

    <!-- Materias de una academia -->
    <div id="seccionMaterias" style="display:none;">
      <div class="card">
        <button class="btn-volver" onclick="volverAAcademias()">← Academias</button>
        <h2 id="tituloAcademia" style="display:inline; margin-left:12px;"></h2>
        <div id="listaMaterias" style="margin-top:16px;"></div>
      </div>
    </div>

    <!-- Acta de calificaciones -->
    <div id="seccionActa" style="display:none;">
      <div class="card">
        <button class="btn-volver" onclick="volverAMaterias()">← Materias</button>
        <h2 id="tituloActa" style="display:inline; margin-left:12px;"></h2>
        <div id="contenidoActa" style="margin-top:16px;"><p style="color:#999;">Cargando...</p></div>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  <script src="../../js/utils/firebase.js"></script>
  <script>
    let carrerasData = [];
    let academiasData = [];
    let academiaActual = null;
    let asignacionesAcademia = [];

    firebase.auth().onAuthStateChanged(async (user) => {
      if (!user) { window.location.href = '../../index.html'; return; }
      try {
        const u = await obtenerUsuarioConCache(user.uid);
        if (!u || u.rol !== 'administracion') {
          await firebase.auth().signOut();
          window.location.href = '../../index.html';
          return;
        }
        document.getElementById('userName').textContent = u.nombre;
        await Promise.all([cargarCarreras(), cargarAcademias()]);
      } catch (e) {
        console.error(e);
        window.location.href = '../../index.html';
      }
    });

    async function cargarCarreras() {
      const snap = await db.collection('carreras').get();
      carrerasData = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    }

    async function cargarAcademias() {
      const snap = await db.collection('academias').get();
      academiasData = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      academiasData.sort((a, b) => (a.nombre || '').localeCompare(b.nombre || ''));

      if (academiasData.length === 0) {
        document.getElementById('listaAcademias').innerHTML = '<p class="sin-datos">No hay academias registradas.</p>';
        return;
      }

      let html = '<div class="academia-grid">';
      academiasData.forEach(ac => {
        const n = (ac.materiasAutorizadas || []).length;
        html += `<div class="academia-card" onclick="verAcademia('${ac.id}')">
          <h3>${ac.nombre || ac.id}</h3>
          ${ac.descripcion ? `<p style="font-size:0.82rem; color:#666; margin-top:4px;">${ac.descripcion}</p>` : ''}
          <span class="badge-n">${n} materia${n !== 1 ? 's' : ''} autorizada${n !== 1 ? 's' : ''}</span>
        </div>`;
      });
      html += '</div>';
      document.getElementById('listaAcademias').innerHTML = html;
    }

    async function verAcademia(academiaId) {
      academiaActual = academiasData.find(a => a.id === academiaId);
      if (!academiaActual) return;

      document.getElementById('seccionAcademias').style.display = 'none';
      document.getElementById('seccionActa').style.display = 'none';
      document.getElementById('seccionMaterias').style.display = 'block';
      document.getElementById('tituloAcademia').textContent = academiaActual.nombre || academiaId;
      document.getElementById('listaMaterias').innerHTML = '<p style="color:#999;">Cargando...</p>';

      const materiasAutorizadas = academiaActual.materiasAutorizadas || [];
      if (materiasAutorizadas.length === 0) {
        document.getElementById('listaMaterias').innerHTML =
          '<p class="sin-datos">Esta academia no tiene materias autorizadas.<br><small>El administrador puede asignarlas desde Gestionar Academias.</small></p>';
        return;
      }

      const BATCH = 30;
      asignacionesAcademia = [];
      for (let i = 0; i < materiasAutorizadas.length; i += BATCH) {
        const lote = materiasAutorizadas.slice(i, i + BATCH);
        const snap = await db.collection('profesorMaterias')
          .where('materiaId', 'in', lote)
          .where('activa', '==', true)
          .get();
        snap.forEach(doc => asignacionesAcademia.push({ id: doc.id, ...doc.data() }));
      }

      if (asignacionesAcademia.length === 0) {
        document.getElementById('listaMaterias').innerHTML =
          '<p class="sin-datos">Las materias autorizadas no tienen asignaciones activas actualmente.</p>';
        return;
      }

      asignacionesAcademia.sort((a, b) => (a.materiaNombre || '').localeCompare(b.materiaNombre || ''));

      let html = `<div style="overflow-x:auto;"><table>
        <thead><tr>
          <th>Materia</th><th>Carrera</th><th>Grupo</th><th>Turno</th><th>Profesor</th><th>Periodo</th><th></th>
        </tr></thead><tbody>`;
      asignacionesAcademia.forEach(m => {
        const carrera = carrerasData.find(c => c.id === m.carreraId);
        const safe = s => (s || '').replace(/'/g, "\\'");
        html += `<tr>
          <td>${m.materiaNombre || '-'}</td>
          <td>${carrera ? carrera.nombre : (m.carreraId || '-')}</td>
          <td>${m.codigoGrupo || '-'}</td>
          <td>${turnoNombre(m.turno)}</td>
          <td>${m.profesorNombre || '-'}</td>
          <td>${m.periodo || '-'}</td>
          <td><button class="btn-ver"
            onclick="verActa('${safe(m.id)}','${safe(m.materiaNombre)}','${safe(m.codigoGrupo)}')">
            Ver Acta
          </button></td>
        </tr>`;
      });
      html += '</tbody></table></div>';
      document.getElementById('listaMaterias').innerHTML = html;
    }

    function volverAAcademias() {
      document.getElementById('seccionMaterias').style.display = 'none';
      document.getElementById('seccionActa').style.display = 'none';
      document.getElementById('seccionAcademias').style.display = 'block';
    }

    function volverAMaterias() {
      document.getElementById('seccionActa').style.display = 'none';
      document.getElementById('seccionMaterias').style.display = 'block';
    }

    async function verActa(asignacionId, materiaNombre, codigoGrupo) {
      document.getElementById('seccionMaterias').style.display = 'none';
      document.getElementById('seccionActa').style.display = 'block';
      document.getElementById('tituloActa').textContent = `${materiaNombre} — Grupo ${codigoGrupo}`;
      const container = document.getElementById('contenidoActa');
      container.innerHTML = '<p style="color:#999;">Cargando calificaciones...</p>';

      try {
        const asigDoc = await db.collection('profesorMaterias').doc(asignacionId).get();
        if (!asigDoc.exists) {
          container.innerHTML = '<p style="color:red;">Asignación no encontrada.</p>';
          return;
        }
        const asig = asigDoc.data();

        const [alumnosSnap, inscSnap] = await Promise.all([
          db.collection('usuarios')
            .where('rol', '==', 'alumno')
            .where('codigoGrupo', '==', asig.codigoGrupo)
            .where('activo', '==', true)
            .get(),
          db.collection('inscripcionesEspeciales')
            .where('asignacionId', '==', asignacionId)
            .get()
        ]);

        const alumnosMap = new Map();
        alumnosSnap.forEach(doc => {
          const a = doc.data();
          alumnosMap.set(doc.id, { id: doc.id, nombre: a.nombre || '-', matricula: a.matricula || '-', esEspecial: false });
        });

        const especIds = [];
        inscSnap.forEach(doc => {
          const d = doc.data();
          if (d.alumnoId && !alumnosMap.has(d.alumnoId)) especIds.push(d.alumnoId);
        });
        if (especIds.length > 0) {
          const especDocs = await Promise.all(especIds.map(id => db.collection('usuarios').doc(id).get()));
          especDocs.forEach(doc => {
            if (doc.exists) {
              const a = doc.data();
              alumnosMap.set(doc.id, { id: doc.id, nombre: a.nombre || '-', matricula: a.matricula || '-', esEspecial: true });
            }
          });
        }

        if (alumnosMap.size === 0) {
          container.innerHTML = `<p class="sin-datos">No hay alumnos en el grupo <strong>${asig.codigoGrupo}</strong>.</p>`;
          return;
        }

        const califSnap = await db.collection('calificaciones')
          .where('profesorId', '==', asig.profesorId)
          .where('codigoGrupo', '==', asig.codigoGrupo)
          .get();

        const califMap = new Map();
        califSnap.forEach(doc => {
          const c = doc.data();
          const p = c.parciales || {};
          const f = c.faltas || {};
          califMap.set(c.alumnoId, {
            p1: p.parcial1 ?? null, p2: p.parcial2 ?? null, p3: p.parcial3 ?? null,
            promedio: c.promedio ?? null,
            extraordinario: c.extraordinario ?? null,
            ets: c.ets ?? null,
            faltas: (f.falta1 || 0) + (f.falta2 || 0) + (f.falta3 || 0)
          });
        });

        const alumnos = Array.from(alumnosMap.values()).map(a => ({
          ...a, ...(califMap.get(a.id) || { p1: null, p2: null, p3: null, promedio: null, extraordinario: null, ets: null, faltas: 0 })
        })).sort((a, b) => a.nombre.localeCompare(b.nombre));

        const fmt = v => (v !== null && v !== undefined) ? v : '-';
        const clsProm = p => {
          if (p === null || p === undefined) return '';
          if (p === 'NP') return 'prom-np';
          return p >= 6 ? 'prom-aprobado' : 'prom-reprobado';
        };

        let html = `<div style="overflow-x:auto;"><table>
          <thead><tr>
            <th>Alumno</th><th>Matrícula</th><th>P1</th><th>P2</th><th>P3</th>
            <th>Promedio</th><th>Extra</th><th>ETS</th><th>Faltas</th>
          </tr></thead><tbody>`;
        alumnos.forEach(a => {
          html += `<tr>
            <td>${a.nombre}${a.esEspecial ? ' <span style="color:#ff6f00;font-size:0.8em;" title="Inscripción especial">★</span>' : ''}</td>
            <td>${a.matricula}</td>
            <td>${fmt(a.p1)}</td><td>${fmt(a.p2)}</td><td>${fmt(a.p3)}</td>
            <td class="${clsProm(a.promedio)}">${fmt(a.promedio)}</td>
            <td>${fmt(a.extraordinario)}</td><td>${fmt(a.ets)}</td><td>${a.faltas}</td>
          </tr>`;
        });
        html += `</tbody></table></div>
        <p style="margin-top:10px;font-size:0.82rem;color:#888;">
          ${alumnos.length} alumno(s) &nbsp;|&nbsp; Grupo: ${asig.codigoGrupo} &nbsp;|&nbsp; Profesor: ${asig.profesorNombre || '-'}
          ${inscSnap.size > 0 ? ' &nbsp;|&nbsp; ★ = Inscripción especial' : ''}
        </p>`;
        container.innerHTML = html;
      } catch (e) {
        container.innerHTML = `<p style="color:red;">Error: ${e.message}</p>`;
      }
    }

    function turnoNombre(t) {
      return { 1: 'Matutino', 2: 'Vespertino', 3: 'Nocturno', 4: 'Sabatino' }[t] || '-';
    }
  </script>
</body>
</html>
