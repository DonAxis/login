<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Control Escolar — Administración SICE</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f6f8; color: #333; min-height: 100vh; }
    .header {
      background: linear-gradient(135deg, #6A2135 0%, #3a121d 100%);
      color: white;
      padding: 14px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header h1 { font-size: 1.25rem; margin-bottom: 2px; }
    .badge-ro {
      display: inline-block;
      background: rgba(255,152,0,0.25);
      color: #ffcc80;
      border: 1px solid rgba(255,152,0,0.4);
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 0.7rem;
    }
    .header-right { display: flex; align-items: center; gap: 12px; }
    .user-name { font-size: 0.85rem; opacity: 0.85; }
    .btn-back {
      background: rgba(255,255,255,0.15);
      color: white;
      border: 1px solid rgba(255,255,255,0.3);
      padding: 7px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.85rem;
      transition: background 0.2s;
    }
    .btn-back:hover { background: rgba(255,255,255,0.25); }
    .content { max-width: 1100px; margin: 24px auto; padding: 0 20px 40px; }
    .card {
      background: white;
      border-radius: 12px;
      padding: 20px 24px;
      margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
    }
    .card h2 { font-size: 1.05rem; color: #6A2135; margin-bottom: 14px; font-weight: 600; }
    .filtros { display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-end; }
    select, input[type="text"] {
      padding: 9px 14px;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      font-size: 0.92rem;
      background: #fff;
      cursor: pointer;
    }
    select { min-width: 220px; }
    input[type="text"] { min-width: 200px; max-width: 300px; }
    select:focus, input:focus { outline: none; border-color: #6A2135; }
    table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    thead th { background: #6A2135; color: white; padding: 10px 12px; text-align: left; font-weight: 600; }
    tbody td { padding: 9px 12px; border-bottom: 1px solid #eee; vertical-align: middle; }
    tbody tr:hover { background: #fdf5f6; }
    tbody tr:last-child td { border-bottom: none; }
    .btn-ver {
      background: #6A2135;
      color: white;
      border: none;
      padding: 5px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.82rem;
    }
    .btn-ver:hover { background: #4a1525; }
    .btn-volver {
      background: #eee;
      color: #555;
      border: none;
      padding: 7px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.85rem;
      margin-bottom: 16px;
    }
    .btn-volver:hover { background: #ddd; }
    .sin-datos { text-align: center; padding: 30px; color: #999; }
    .detalle-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 14px;
      margin-top: 4px;
    }
    .detalle-item label { font-size: 0.75rem; color: #888; text-transform: uppercase; letter-spacing: 0.5px; display: block; margin-bottom: 2px; }
    .detalle-item span { font-size: 0.95rem; font-weight: 500; }
    .chip {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 0.78rem;
      font-weight: 600;
    }
    .chip-activo { background: #e8f5e9; color: #2e7d32; }
    .chip-inactivo { background: #fce4ec; color: #c62828; }
  </style>
</head>
<body>
  <div class="header">
    <div>
      <h1>Control Escolar</h1>
      <span class="badge-ro">Solo lectura</span>
    </div>
    <div class="header-right">
      <span class="user-name" id="userName"></span>
      <button class="btn-back" onclick="window.location.href='./administracion.html'">← Inicio</button>
    </div>
  </div>

  <div class="content">
    <!-- Filtros -->
    <div class="card">
      <h2>Buscar alumnos</h2>
      <div class="filtros">
        <select id="selectCarrera" onchange="cargarAlumnos()">
          <option value="">— Todas las carreras —</option>
        </select>
        <input type="text" id="buscador" placeholder="Buscar por nombre o matrícula..." oninput="filtrarAlumnos()">
      </div>
    </div>

    <!-- Lista de alumnos -->
    <div id="seccionLista" style="display:none;">
      <div class="card">
        <h2 id="tituloLista">Alumnos</h2>
        <div id="listaAlumnos"></div>
      </div>
    </div>

    <!-- Detalle del alumno -->
    <div id="seccionDetalle" style="display:none;">
      <div class="card">
        <button class="btn-volver" onclick="volverALista()">← Lista</button>
        <h2 id="nombreAlumnoDetalle" style="display:inline; margin-left:12px;"></h2>
        <div id="contenidoDetalle" style="margin-top:20px;"></div>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  <script src="../../js/utils/firebase.js"></script>
  <script>
    let carrerasData = [];
    let alumnosCargados = [];

    firebase.auth().onAuthStateChanged(async (user) => {
      if (!user) { window.location.href = '../../index.html'; return; }
      try {
        const u = await obtenerUsuarioConCache(user.uid);
        if (!u || u.rol !== 'administracion') {
          await firebase.auth().signOut();
          window.location.href = '../../index.html';
          return;
        }
        document.getElementById('userName').textContent = u.nombre;
        await cargarCarreras();
      } catch (e) {
        console.error(e);
        window.location.href = '../../index.html';
      }
    });

    async function cargarCarreras() {
      const snap = await db.collection('carreras').orderBy('nombre').get();
      carrerasData = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      const sel = document.getElementById('selectCarrera');
      carrerasData.forEach(c => {
        const opt = document.createElement('option');
        opt.value = c.id;
        opt.textContent = `${c.nombre} (${c.id})`;
        sel.appendChild(opt);
      });
    }

    async function cargarAlumnos() {
      const carreraId = document.getElementById('selectCarrera').value;
      document.getElementById('seccionDetalle').style.display = 'none';
      document.getElementById('buscador').value = '';

      let query = db.collection('usuarios').where('rol', '==', 'alumno');
      if (carreraId) query = query.where('carreraId', '==', carreraId);

      document.getElementById('seccionLista').style.display = 'block';
      document.getElementById('listaAlumnos').innerHTML = '<p style="color:#999;">Cargando...</p>';

      const snap = await query.get();
      alumnosCargados = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      alumnosCargados.sort((a, b) => (a.nombre || '').localeCompare(b.nombre || ''));

      const carrera = carrerasData.find(c => c.id === carreraId);
      document.getElementById('tituloLista').textContent =
        `Alumnos${carrera ? ' — ' + carrera.nombre : ''} (${alumnosCargados.length})`;

      renderAlumnos(alumnosCargados);
    }

    function filtrarAlumnos() {
      const q = document.getElementById('buscador').value.toLowerCase().trim();
      if (!q) { renderAlumnos(alumnosCargados); return; }
      const filtrados = alumnosCargados.filter(a =>
        (a.nombre || '').toLowerCase().includes(q) ||
        (a.matricula || '').toLowerCase().includes(q)
      );
      renderAlumnos(filtrados);
    }

    function renderAlumnos(lista) {
      if (lista.length === 0) {
        document.getElementById('listaAlumnos').innerHTML = '<p class="sin-datos">No se encontraron alumnos.</p>';
        return;
      }
      let html = `<div style="overflow-x:auto;"><table>
        <thead><tr>
          <th>Nombre</th><th>Matrícula</th><th>Carrera</th><th>Grupo</th><th>Semestre</th><th>Turno</th><th>Estado</th><th></th>
        </tr></thead><tbody>`;
      lista.forEach((a, i) => {
        const activo = a.activo !== false;
        html += `<tr>
          <td>${a.nombre || '-'}</td>
          <td>${a.matricula || '-'}</td>
          <td>${a.carreraId || '-'}</td>
          <td>${a.codigoGrupo || '-'}</td>
          <td>${a.periodo || '-'}</td>
          <td>${turnoNombre(a.turno)}</td>
          <td><span class="chip ${activo ? 'chip-activo' : 'chip-inactivo'}">${activo ? 'Activo' : 'Inactivo'}</span></td>
          <td><button class="btn-ver" onclick="verDetalle('${a.id}')">Ver</button></td>
        </tr>`;
      });
      html += '</tbody></table></div>';
      document.getElementById('listaAlumnos').innerHTML = html;
    }

    function verDetalle(alumnoId) {
      const a = alumnosCargados.find(x => x.id === alumnoId);
      if (!a) return;

      document.getElementById('seccionLista').style.display = 'none';
      document.getElementById('seccionDetalle').style.display = 'block';
      document.getElementById('nombreAlumnoDetalle').textContent = a.nombre || '-';

      const carrera = carrerasData.find(c => c.id === a.carreraId);
      const activo = a.activo !== false;

      const campo = (label, valor) => `
        <div class="detalle-item">
          <label>${label}</label>
          <span>${valor || '-'}</span>
        </div>`;

      document.getElementById('contenidoDetalle').innerHTML = `
        <div class="detalle-grid">
          ${campo('Matrícula', a.matricula)}
          ${campo('Email', a.email)}
          ${campo('Carrera', carrera ? carrera.nombre : a.carreraId)}
          ${campo('Grupo', a.codigoGrupo)}
          ${campo('Semestre / Periodo', a.periodo)}
          ${campo('Turno', turnoNombre(a.turno))}
          ${campo('Orden en lista', a.orden)}
          ${campo('Generación', a.generacion || a.periodoIngreso)}
          ${campo('Tipo', a.tipoAlumno === 'especial' ? 'Especial' : 'Regular')}
          <div class="detalle-item">
            <label>Estado</label>
            <span class="chip ${activo ? 'chip-activo' : 'chip-inactivo'}">${activo ? 'Activo' : 'Inactivo'}</span>
          </div>
        </div>
        ${a.tutor ? `
          <hr style="margin:18px 0; border-color:#eee;">
          <h3 style="font-size:0.95rem; color:#6A2135; margin-bottom:12px;">Tutor / Padre de familia</h3>
          <div class="detalle-grid">
            ${campo('Nombre del tutor', a.tutor.nombre)}
            ${campo('Teléfono', a.tutor.telefono ? '+52 ' + a.tutor.telefono : null)}
          </div>` : ''}
      `;
    }

    function volverALista() {
      document.getElementById('seccionDetalle').style.display = 'none';
      document.getElementById('seccionLista').style.display = 'block';
    }

    function turnoNombre(t) {
      return { 1: 'Matutino', 2: 'Vespertino', 3: 'Nocturno', 4: 'Sabatino' }[t] || '-';
    }
  </script>
</body>
</html>
