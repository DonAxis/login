<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../../css/common/botones.css">
  <link rel="stylesheet" href="../../css/modules/controlEscolar.css">
  <title>Historial Académico</title>
  <style>
    body { font-family: 'Segoe UI', sans-serif; background: #f5f5f5; margin: 0; padding: 0; }
    .container { max-width: 1100px; margin: 0 auto; padding: 20px; }
    .header { background: linear-gradient(135deg, #6A2135, #8B2E45); color: white; padding: 20px 30px; border-radius: 12px; margin-bottom: 25px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; }
    .header h1 { margin: 0; font-size: 1.5rem; }
    .header p { margin: 0; opacity: 0.85; }
    table { width: 100%; border-collapse: collapse; background: white; border-radius: 10px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin-bottom: 20px; }
    th { background: #6A2135; color: white; padding: 12px 15px; text-align: left; font-size: 0.9rem; }
    td { padding: 10px 15px; border-bottom: 1px solid #f0f0f0; font-size: 0.9rem; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #fafafa; }
    tfoot td { background: #f8f9fa; font-weight: bold; }
    .info-card { background: white; padding: 20px; border-radius: 10px; margin-bottom: 20px; border: 2px solid #6A2135; display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; }
    .periodo-titulo { margin: 25px 0 12px; color: #6A2135; border-bottom: 2px solid #6A2135; padding-bottom: 8px; font-size: 1.1rem; }
    .cargando { text-align: center; padding: 60px; color: #666; font-size: 1.1rem; }
    .btns-pdf { display: flex; flex-direction: column; gap: 8px; margin-top: 10px; }
    .btn-pdf { color: white; border: none; padding: 10px 14px; border-radius: 8px; cursor: pointer; font-size: 0.85rem; width: 100%; font-weight: 600; }
    .btn-pdf.rojo   { background: #dc3545; } .btn-pdf.rojo:hover   { background: #c82333; }
    .btn-pdf.azul   { background: #1565c0; } .btn-pdf.azul:hover   { background: #0d47a1; }
    .btn-pdf.verde  { background: #388e3c; } .btn-pdf.verde:hover  { background: #2e7d32; }
    .btn-pdf.gris   { background: #757575; cursor: not-allowed; opacity: 0.7; }
    #modalGenerico { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.75); z-index:1000; justify-content:center; align-items:flex-start; overflow-y:auto; padding:20px; }
    .btn-cerrar { background: transparent; color: white; border: 2px solid rgba(255,255,255,0.7); padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 0.9rem; }
    .btn-cerrar:hover { background: rgba(255,255,255,0.15); }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div>
        <h1>Historial Académico</h1>
        <p id="subtitulo">Cargando...</p>
      </div>
      <button onclick="window.close()" class="btn-cerrar">Cerrar pestaña</button>
    </div>
    <div id="contenido" class="cargando">Cargando historial...</div>
  </div>

  <div id="modalGenerico">
    <div id="contenidoModal"></div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
  <script src="../../js/utils/firebase.js"></script>
  <script src="../../js/utils/logoPdf.js"></script>
  <script src="../../js/utils/calificaciones.js"></script>
  <script src="../../js/coordinador/HistorialAlumnoPDF.js"></script>
  <script src="../../js/coordinador/InformeCalificacionesPDF.js"></script>
  <script src="../../js/escolar/boletaGlobal.js"></script>
  <script>
    function cerrarModal() {
      const m = document.getElementById('modalGenerico');
      if (m) m.style.display = 'none';
    }
  </script>
  <script>
    const auth = firebase.auth();

    auth.onAuthStateChanged(async (user) => {
      if (!user) {
        document.getElementById('contenido').innerHTML = '<p style="color:red;text-align:center;padding:40px;">Sesión no iniciada. Cierra esta pestaña.</p>';
        return;
      }
      const snap = await db.collection('usuarios').doc(user.uid).get();
      if (!snap.exists || snap.data().rol !== 'controlEscolar') {
        document.getElementById('contenido').innerHTML = '<p style="color:red;text-align:center;padding:40px;">Sin permisos.</p>';
        return;
      }
      const params = new URLSearchParams(window.location.search);
      const alumnoId    = params.get('id')     || sessionStorage.getItem('historialAlumnoId');
      const alumnoNombre = params.get('nombre') || sessionStorage.getItem('historialAlumnoNombre') || 'Alumno';

      if (!alumnoId) {
        document.getElementById('contenido').innerHTML = '<p style="color:#666;text-align:center;padding:40px;">No se recibió información del alumno.</p>';
        return;
      }
      document.getElementById('subtitulo').textContent = alumnoNombre;
      await cargarHistorial(alumnoId, alumnoNombre);
    });

    async function cargarHistorial(alumnoId, nombreAlumno) {
      try {
        // Obtener carreraId del alumno para adaptar columnas
        const alumnoDoc = await db.collection('usuarios').doc(alumnoId).get();
        const carreraId = alumnoDoc.exists ? alumnoDoc.data().carreraId : null;

        const [tieneEF, esMaestria] = await Promise.all([
          carreraId ? obtenerTieneExamenFinal(carreraId) : Promise.resolve(false),
          carreraId ? obtenerEsMaestria(carreraId)       : Promise.resolve(false)
        ]);

        // Cargar calificaciones del alumno
        const [calSnap, materiasSnap] = await Promise.all([
          db.collection('calificaciones').where('alumnoId', '==', alumnoId).get(),
          db.collection('materias').get()
        ]);

        if (calSnap.empty) {
          document.getElementById('contenido').innerHTML = `
            <div class="info-card">
              <div><strong style="color:#666;">Alumno:</strong><br>${nombreAlumno}</div>
              <div><strong style="color:#666;">Total Materias:</strong><br>
                <span style="font-size:1.5rem;color:#999;font-weight:bold;">0</span></div>
              <div><strong style="color:#666;">Periodos Cursados:</strong><br>
                <span style="font-size:1.5rem;color:#999;font-weight:bold;">0</span></div>
              <div class="btns-pdf">
                <button class="btn-pdf rojo" onclick="descargarHistorialAlumnoPDF('${alumnoId}', '${nombreAlumno.replace(/'/g, "\\'")}')">
                  Historial Actual
                </button>
                <button class="btn-pdf azul" onclick="descargarInformeCalificacionesPDF('${alumnoId}', '${nombreAlumno.replace(/'/g, "\\'")}', true)">
                  Informe de Calificaciones
                </button>
                <button class="btn-pdf verde" onclick="verBoletaGlobalAlumno('${alumnoId}')">
                  Boleta Global
                </button>
              </div>
            </div>
            <p style="color:#999;text-align:center;padding:20px;">Este alumno aún no tiene calificaciones capturadas.</p>`;
          return;
        }

        const materiasCache = {};
        materiasSnap.forEach(d => { materiasCache[d.id] = d.data(); });

        // Procesar registros incluyendo extraordinario y ets
        const materiasMap = {};
        calSnap.forEach(doc => {
          const cal = doc.data();
          const key = `${cal.materiaId}_${cal.periodo}`;
          materiasMap[key] = {
            materiaNombre: cal.materiaNombre || materiasCache[cal.materiaId]?.nombre || 'Sin nombre',
            materiaCodigo: cal.materiaCodigo || materiasCache[cal.materiaId]?.codigo || '',
            periodo:       cal.periodo || 'N/A',
            parcial1:      cal.parciales?.parcial1 ?? null,
            parcial2:      cal.parciales?.parcial2 ?? null,
            parcial3:      cal.parciales?.parcial3 ?? null,
            promedio:      cal.promedio      ?? null,
            extraordinario: cal.extraordinario ?? null,
            ets:           cal.ets            ?? null
          };
        });

        // Agrupar por periodo
        const porPeriodo = {};
        Object.values(materiasMap).forEach(m => {
          if (!porPeriodo[m.periodo]) porPeriodo[m.periodo] = [];
          porPeriodo[m.periodo].push(m);
        });
        const periodos = Object.keys(porPeriodo).sort().reverse();

        // Columnas y posición de "Promedio del Periodo" según tipo de carrera
        // colsBeforePromedio = cols antes de la columna de calificación final
        // colsAfterPromedio  = cols vacías después de ella en el tfoot
        let cabeceras, colsBeforePromedio, colsAfterPromedio;
        if (esMaestria) {
          cabeceras = `<th style="text-align:center;">Calificación</th>`;
          colsBeforePromedio = 2; colsAfterPromedio = 0;
        } else if (tieneEF) {
          cabeceras = `
            <th style="text-align:center;">Parcial 1</th>
            <th style="text-align:center;">Parcial 2</th>
            <th style="text-align:center;">Examen Final</th>
            <th style="text-align:center;">Calificación</th>
            <th style="text-align:center;">Extraordinario</th>`;
          colsBeforePromedio = 5; colsAfterPromedio = 1;
        } else {
          cabeceras = `
            <th style="text-align:center;">Parcial 1</th>
            <th style="text-align:center;">Parcial 2</th>
            <th style="text-align:center;">Parcial 3</th>
            <th style="text-align:center;">Promedio</th>
            <th style="text-align:center;">Extraordinario</th>
            <th style="text-align:center;">ETS</th>`;
          colsBeforePromedio = 5; colsAfterPromedio = 2;
        }

        // Construir HTML
        let html = `
          <div class="info-card">
            <div><strong style="color:#666;">Alumno:</strong><br>${nombreAlumno}</div>
            <div><strong style="color:#666;">Total Materias:</strong><br>
              <span style="font-size:1.5rem;color:#4caf50;font-weight:bold;">${Object.keys(materiasMap).length}</span></div>
            <div><strong style="color:#666;">Periodos Cursados:</strong><br>
              <span style="font-size:1.5rem;color:#6A2135;font-weight:bold;">${periodos.length}</span></div>
            <div class="btns-pdf">
              <button class="btn-pdf rojo" onclick="descargarHistorialAlumnoPDF('${alumnoId}', '${nombreAlumno.replace(/'/g, "\\'")}')">
                Historial Actual
              </button>
              <button class="btn-pdf azul" onclick="descargarInformeCalificacionesPDF('${alumnoId}', '${nombreAlumno.replace(/'/g, "\\'")}', true)">
                Informe de Calificaciones
              </button>
              <button class="btn-pdf verde" onclick="verBoletaGlobalAlumno('${alumnoId}')">
                Boleta Global
              </button>
            </div>
          </div>`;

        periodos.forEach(periodo => {
          const materias = porPeriodo[periodo];
          let suma = 0, count = 0;

          html += `<h3 class="periodo-titulo">Periodo ${periodo}</h3>
            <table>
              <thead><tr>
                <th>Materia</th><th>Código</th>
                ${cabeceras}
              </tr></thead>
              <tbody>`;

          materias.forEach(m => {
            // Usar promedio almacenado si existe; sino recalcular desde parciales
            let prom;
            if (m.promedio !== null && m.promedio !== undefined) {
              prom = redondearCalificacion(m.promedio);
            } else {
              const toN = v => (v !== null && v !== undefined && v !== 'NP') ? parseFloat(v) : (v === 'NP' ? 'NP' : null);
              const calNum = esMaestria
                ? toN(m.parcial1)
                : calcularCalificacion(toN(m.parcial1), toN(m.parcial2), toN(m.parcial3), tieneEF);
              prom = redondearCalificacion(calNum);
            }

            const promStr = (prom === null || prom === undefined) ? '-' : String(prom);
            const promNum = parseFloat(promStr);
            const colorProm = promStr === 'NP' ? '#dc3545'
              : isNaN(promNum) ? '#333'
              : promNum >= 8 ? '#4caf50' : promNum >= 6 ? '#ff9800' : '#f44336';
            if (!isNaN(promNum)) { suma += promNum; count++; }

            const p1 = m.parcial1 !== null && m.parcial1 !== undefined ? String(m.parcial1) : '-';
            const p2 = m.parcial2 !== null && m.parcial2 !== undefined ? String(m.parcial2) : '-';
            const p3 = m.parcial3 !== null && m.parcial3 !== undefined ? String(m.parcial3) : '-';
            const extStr = m.extraordinario !== null && m.extraordinario !== undefined
              ? String(redondearCalificacion(m.extraordinario)) : '-';
            const etsStr = m.ets !== null && m.ets !== undefined
              ? String(redondearCalificacion(m.ets)) : '-';

            let celdas;
            if (esMaestria) {
              celdas = `<td style="text-align:center;font-weight:bold;font-size:1.2rem;color:${colorProm};">${promStr}</td>`;
            } else if (tieneEF) {
              celdas = `
                <td style="text-align:center;font-weight:bold;">${p1}</td>
                <td style="text-align:center;font-weight:bold;">${p2}</td>
                <td style="text-align:center;font-weight:bold;">${p3}</td>
                <td style="text-align:center;font-weight:bold;font-size:1.2rem;color:${colorProm};">${promStr}</td>
                <td style="text-align:center;font-weight:bold;">${extStr}</td>`;
            } else {
              celdas = `
                <td style="text-align:center;font-weight:bold;">${p1}</td>
                <td style="text-align:center;font-weight:bold;">${p2}</td>
                <td style="text-align:center;font-weight:bold;">${p3}</td>
                <td style="text-align:center;font-weight:bold;font-size:1.2rem;color:${colorProm};">${promStr}</td>
                <td style="text-align:center;font-weight:bold;">${extStr}</td>
                <td style="text-align:center;font-weight:bold;">${etsStr}</td>`;
            }

            html += `<tr>
              <td><strong>${m.materiaNombre}</strong></td>
              <td>${m.materiaCodigo}</td>
              ${celdas}
            </tr>`;
          });

          const promPeriodo = count > 0 ? (suma / count).toFixed(1) : '-';
          const colsAfterStr = colsAfterPromedio > 0 ? `<td colspan="${colsAfterPromedio}"></td>` : '';
          html += `</tbody>
            <tfoot><tr>
              <td colspan="${colsBeforePromedio}" style="text-align:right;padding-right:20px;">Promedio del Periodo:</td>
              <td style="text-align:center;font-size:1.2rem;color:#6A2135;">${promPeriodo}</td>
              ${colsAfterStr}
            </tr></tfoot>
            </table>`;
        });

        document.getElementById('contenido').innerHTML = html;
      } catch (err) {
        console.error(err);
        document.getElementById('contenido').innerHTML =
          '<p style="color:red;text-align:center;padding:40px;">Error al cargar el historial.</p>';
      }
    }
  </script>
</body>
</html>
