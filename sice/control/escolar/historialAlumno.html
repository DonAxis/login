<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../../css/common/botones.css">
  <link rel="stylesheet" href="../../css/modules/controlEscolar.css">
  <title>Historial Académico</title>
  <style>
    body { font-family: 'Segoe UI', sans-serif; background: #f5f5f5; margin: 0; padding: 0; }
    .container { max-width: 1100px; margin: 0 auto; padding: 20px; }
    .header { background: linear-gradient(135deg, #6A2135, #8B2E45); color: white; padding: 20px 30px; border-radius: 12px; margin-bottom: 25px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; }
    .header h1 { margin: 0; font-size: 1.5rem; }
    .header p { margin: 0; opacity: 0.85; }
    table { width: 100%; border-collapse: collapse; background: white; border-radius: 10px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin-bottom: 20px; }
    th { background: #6A2135; color: white; padding: 12px 15px; text-align: left; font-size: 0.9rem; }
    td { padding: 10px 15px; border-bottom: 1px solid #f0f0f0; font-size: 0.9rem; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #fafafa; }
    tfoot td { background: #f8f9fa; font-weight: bold; }
    .info-card { background: white; padding: 20px; border-radius: 10px; margin-bottom: 20px; border: 2px solid #6A2135; display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; }
    .periodo-titulo { margin: 25px 0 12px; color: #6A2135; border-bottom: 2px solid #6A2135; padding-bottom: 8px; font-size: 1.1rem; }
    .cargando { text-align: center; padding: 60px; color: #666; font-size: 1.1rem; }
    .btns-pdf { display: flex; flex-direction: column; gap: 8px; margin-top: 10px; }
    .btn-pdf { color: white; border: none; padding: 10px 14px; border-radius: 8px; cursor: pointer; font-size: 0.85rem; width: 100%; font-weight: 600; }
    .btn-pdf.rojo   { background: #dc3545; } .btn-pdf.rojo:hover   { background: #c82333; }
    .btn-pdf.azul   { background: #1565c0; } .btn-pdf.azul:hover   { background: #0d47a1; }
    .btn-pdf.verde  { background: #388e3c; } .btn-pdf.verde:hover  { background: #2e7d32; }
    .btn-pdf.gris   { background: #757575; cursor: not-allowed; opacity: 0.7; }
    #modalGenerico { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.75); z-index:1000; justify-content:center; align-items:flex-start; overflow-y:auto; padding:20px; }
    .btn-cerrar { background: transparent; color: white; border: 2px solid rgba(255,255,255,0.7); padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 0.9rem; }
    .btn-cerrar:hover { background: rgba(255,255,255,0.15); }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div>
        <h1>Historial Académico</h1>
        <p id="subtitulo">Cargando...</p>
      </div>
      <button onclick="window.close()" class="btn-cerrar">Cerrar pestaña</button>
    </div>
    <div id="contenido" class="cargando">Cargando historial...</div>
  </div>

  <div id="modalGenerico">
    <div id="contenidoModal"></div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
  <script src="../../js/utils/firebase.js"></script>
  <script src="../../js/utils/logoPdf.js"></script>
  <script src="../../js/utils/calificaciones.js"></script>
  <script src="../../js/coordinador/HistorialAlumnoPDF.js"></script>
  <script src="../../js/coordinador/InformeCalificacionesPDF.js"></script>
  <script src="../../js/escolar/PeriodoPDF.js"></script>
  <script src="../../js/escolar/boletaGlobal.js"></script>
  <script>
    function cerrarModal() {
      const m = document.getElementById('modalGenerico');
      if (m) m.style.display = 'none';
    }
  </script>
  <script>
    // ── Estado compartido entre funciones de vista ───────────────────────────
    const _h = {};
    const _TURNOS_H    = { 1: 'Matutino', 2: 'Vespertino', 3: 'Nocturno', 4: 'Sabatino' };
    const _SEMESTRES_H = {
      1: 'Primero', 2: 'Segundo',  3: 'Tercero', 4: 'Cuarto', 5: 'Quinto',
      6: 'Sexto',   7: 'Séptimo', 8: 'Octavo',   9: 'Noveno'
    };

    // ── Tabla con P1/F1/P2/F2/P3/F3/Calificación/Extra/ETS: delega al array ──
    function _construirTablaConFaltas(periodo) {
      return _construirTablaConFaltasArray((_h.porPeriodo || {})[periodo]);
    }

    // ── Versión base: recibe array directo de materias ────────────────────────
    function _construirTablaConFaltasArray(mats) {
      if (!mats || mats.length === 0) {
        return '<p style="color:#999;text-align:center;padding:20px;">Sin calificaciones capturadas.</p>';
      }
      const { esMaestria, tieneEF } = _h;

      let thsCols, colsAntesCal, colsDespuesCal;
      if (esMaestria) {
        thsCols = '<th style="text-align:center;">Calificación</th>';
        colsAntesCal = 2; colsDespuesCal = 0;
      } else if (tieneEF) {
        thsCols = `
          <th style="text-align:center;">P1</th><th style="text-align:center;">Faltas</th>
          <th style="text-align:center;">P2</th><th style="text-align:center;">Faltas</th>
          <th style="text-align:center;">Exam.Final</th><th style="text-align:center;">-</th>
          <th style="text-align:center;font-weight:bold;">Calificación</th>
          <th style="text-align:center;">Extra</th><th style="text-align:center;">ETS</th>`;
        colsAntesCal = 8; colsDespuesCal = 2;
      } else {
        thsCols = `
          <th style="text-align:center;">P1</th><th style="text-align:center;">Faltas</th>
          <th style="text-align:center;">P2</th><th style="text-align:center;">Faltas</th>
          <th style="text-align:center;">P3</th><th style="text-align:center;">Faltas</th>
          <th style="text-align:center;font-weight:bold;">Calificación</th>
          <th style="text-align:center;">Extra</th><th style="text-align:center;">ETS</th>`;
        colsAntesCal = 8; colsDespuesCal = 2;
      }

      const val = x => (x !== null && x !== undefined) ? String(x) : '-';
      let suma = 0, count = 0, tbody = '';

      mats.forEach((m, i) => {
        const toN = v => (v !== null && v !== undefined && v !== 'NP') ? parseFloat(v) : (v === 'NP' ? 'NP' : null);
        const calNum = esMaestria
          ? toN(m.parcial1)
          : calcularCalificacion(toN(m.parcial1), toN(m.parcial2), toN(m.parcial3), tieneEF);
        let prom = redondearCalificacion(calNum);
        // ETS > extraordinario tienen prioridad sobre el valor calculado (igual que PeriodoPDF.js)
        if (m.ets != null)                prom = redondearCalificacion(m.ets);
        else if (m.extraordinario != null) prom = redondearCalificacion(m.extraordinario);
        const promStr   = (prom === null || prom === undefined) ? '-' : String(prom);
        const promNum   = parseFloat(promStr);
        const _reprobado67 = tieneEF && m.ets == null && m.extraordinario == null
          && (m.parcial3 == null || m.parcial3 === undefined);
        const colorProm = promStr === 'NP' ? '#dc3545' : isNaN(promNum) ? '#333'
          : promNum >= 8 ? '#4caf50' : promNum < 6 ? '#f44336'
          : _reprobado67 ? '#f44336' : '#4caf50';
        if (!isNaN(promNum)) { suma += promNum; count++; }

        const p1 = val(m.parcial1); const f1 = val(m.falta1);
        const p2 = val(m.parcial2); const f2 = val(m.falta2);
        const p3 = val(m.parcial3); const f3 = tieneEF ? '-' : val(m.falta3);
        const extStr = m.extraordinario !== null && m.extraordinario !== undefined
          ? String(redondearCalificacion(m.extraordinario)) : '-';
        const etsStr = m.ets !== null && m.ets !== undefined
          ? String(redondearCalificacion(m.ets)) : '-';

        let celdas;
        if (esMaestria) {
          celdas = `<td style="text-align:center;font-weight:bold;font-size:1.1rem;color:${colorProm};">${promStr}</td>`;
        } else {
          celdas = `
            <td style="text-align:center;font-weight:bold;">${p1}</td>
            <td style="text-align:center;color:#777;font-size:0.85rem;">${f1}</td>
            <td style="text-align:center;font-weight:bold;">${p2}</td>
            <td style="text-align:center;color:#777;font-size:0.85rem;">${f2}</td>
            <td style="text-align:center;font-weight:bold;">${p3}</td>
            <td style="text-align:center;color:#777;font-size:0.85rem;">${f3}</td>
            <td style="text-align:center;font-weight:bold;font-size:1.1rem;color:${colorProm};">${promStr}</td>
            <td style="text-align:center;">${extStr}</td>
            <td style="text-align:center;">${etsStr}</td>`;
        }
        tbody += `<tr>
          <td style="text-align:center;">${i + 1}</td>
          <td><strong>${m.materiaNombre}</strong>${m.materiaCodigo ? `<br><small style="color:#888;">${m.materiaCodigo}</small>` : ''}</td>
          ${celdas}
        </tr>`;
      });

      const promPeriodo = count > 0 ? (suma / count).toFixed(1) : '-';
      const afterStr    = colsDespuesCal > 0 ? `<td colspan="${colsDespuesCal}"></td>` : '';
      return `<div style="overflow-x:auto;">
        <table>
          <thead><tr>
            <th style="text-align:center;width:36px;">No.</th>
            <th style="text-align:left;">Materia</th>
            ${thsCols}
          </tr></thead>
          <tbody>${tbody}</tbody>
          <tfoot><tr>
            <td colspan="${colsAntesCal}" style="text-align:right;padding-right:20px;">Promedio del Periodo:</td>
            <td style="text-align:center;font-size:1.2rem;font-weight:bold;color:#6A2135;">${promPeriodo}</td>
            ${afterStr}
          </tr></tfoot>
        </table>
      </div>`;
    }

    // ── Tabla sin faltas (vista por defecto y Historial Anterior) ────────────
    function _construirTablaUnPeriodo(periodo) {
      const mats = (_h.porPeriodo || {})[periodo];
      if (!mats || mats.length === 0) {
        return '<p style="color:#999;text-align:center;padding:20px;">Sin datos para este periodo.</p>';
      }
      const { cabeceras, colsBeforePromedio, colsAfterPromedio, esMaestria, tieneEF } = _h;
      let suma = 0, count = 0, tbodyHtml = '';

      mats.forEach(m => {
        const toN = v => (v !== null && v !== undefined && v !== 'NP') ? parseFloat(v) : (v === 'NP' ? 'NP' : null);
        const calNum = esMaestria
          ? toN(m.parcial1)
          : calcularCalificacion(toN(m.parcial1), toN(m.parcial2), toN(m.parcial3), tieneEF);
        let prom = redondearCalificacion(calNum);
        // ETS > extraordinario tienen prioridad sobre el valor calculado (igual que PeriodoPDF.js)
        if (m.ets != null)                prom = redondearCalificacion(m.ets);
        else if (m.extraordinario != null) prom = redondearCalificacion(m.extraordinario);
        const promStr = (prom === null || prom === undefined) ? '-' : String(prom);
        const promNum = parseFloat(promStr);
        const _reprobado67 = tieneEF && m.ets == null && m.extraordinario == null
          && (m.parcial3 == null || m.parcial3 === undefined);
        const colorProm = promStr === 'NP' ? '#dc3545' : isNaN(promNum) ? '#333'
          : promNum >= 8 ? '#4caf50' : promNum < 6 ? '#f44336'
          : _reprobado67 ? '#f44336' : '#4caf50';
        if (!isNaN(promNum)) { suma += promNum; count++; }

        const p1 = m.parcial1 !== null && m.parcial1 !== undefined ? String(m.parcial1) : '-';
        const p2 = m.parcial2 !== null && m.parcial2 !== undefined ? String(m.parcial2) : '-';
        const p3 = m.parcial3 !== null && m.parcial3 !== undefined ? String(m.parcial3) : '-';
        const extStr = m.extraordinario !== null && m.extraordinario !== undefined
          ? String(redondearCalificacion(m.extraordinario)) : '-';
        const etsStr = m.ets !== null && m.ets !== undefined
          ? String(redondearCalificacion(m.ets)) : '-';

        let celdas;
        if (esMaestria) {
          celdas = `<td style="text-align:center;font-weight:bold;font-size:1.2rem;color:${colorProm};">${promStr}</td>`;
        } else if (tieneEF) {
          celdas = `
            <td style="text-align:center;font-weight:bold;">${p1}</td>
            <td style="text-align:center;font-weight:bold;">${p2}</td>
            <td style="text-align:center;font-weight:bold;">${p3}</td>
            <td style="text-align:center;font-weight:bold;font-size:1.2rem;color:${colorProm};">${promStr}</td>
            <td style="text-align:center;font-weight:bold;">${extStr}</td>`;
        } else {
          celdas = `
            <td style="text-align:center;font-weight:bold;">${p1}</td>
            <td style="text-align:center;font-weight:bold;">${p2}</td>
            <td style="text-align:center;font-weight:bold;">${p3}</td>
            <td style="text-align:center;font-weight:bold;font-size:1.2rem;color:${colorProm};">${promStr}</td>
            <td style="text-align:center;font-weight:bold;">${extStr}</td>
            <td style="text-align:center;font-weight:bold;">${etsStr}</td>`;
        }
        tbodyHtml += `<tr>
          <td><strong>${m.materiaNombre}</strong></td>
          <td>${m.materiaCodigo}</td>
          ${celdas}
        </tr>`;
      });

      const promPeriodo  = count > 0 ? (suma / count).toFixed(1) : '-';
      const colsAfterStr = colsAfterPromedio > 0 ? `<td colspan="${colsAfterPromedio}"></td>` : '';
      return `<table>
        <thead><tr><th>Materia</th><th>Código</th>${cabeceras}</tr></thead>
        <tbody>${tbodyHtml}</tbody>
        <tfoot><tr>
          <td colspan="${colsBeforePromedio}" style="text-align:right;padding-right:20px;">Promedio del Periodo:</td>
          <td style="text-align:center;font-size:1.2rem;color:#6A2135;">${promPeriodo}</td>
          ${colsAfterStr}
        </tr></tfoot>
      </table>`;
    }

    // ── Informe de Calificaciones: TODOS los periodos con faltas (= PDF inline) ─
    function _vistaInforme() {
      const vistaEl = document.getElementById('vistaActiva');
      if (!vistaEl) return;

      const periodos = Object.keys(_h.porPeriodo || {}).sort().reverse();

      if (periodos.length === 0) {
        vistaEl.innerHTML = '<p style="color:#999;text-align:center;padding:20px;">Sin calificaciones registradas.</p>';
        return;
      }

      const nomSafe = (_h.alumnoNombre || '').replace(/\\/g, '\\\\').replace(/'/g, "\\'");

      // Determinar la clave del periodo actual en porPeriodo
      // (puede ser '2026-1' formato académico o '4' formato semestre numérico)
      const _todosPerKeys = Object.keys(_h.porPeriodo || {});
      let _currentPerKey = null;
      if (_h.periodoActual && _todosPerKeys.includes(String(_h.periodoActual))) {
        _currentPerKey = String(_h.periodoActual);
      } else if (_h.semestreNum && _todosPerKeys.includes(String(_h.semestreNum))) {
        _currentPerKey = String(_h.semestreNum);
      } else if (_todosPerKeys.length > 0) {
        _currentPerKey = _todosPerKeys.sort().at(-1);
      }

      const pdfBtn  = `<div style="text-align:right;margin-bottom:16px;">
        <button class="btn-pdf azul" style="display:inline-block;width:auto;padding:10px 20px;"
          onclick="descargarPeriodoPDF('${_h.alumnoId}', '${nomSafe}', '${_currentPerKey}', true, true)">
          Descargar Informe PDF
        </button></div>`;

      // Tarjeta resumen del alumno
      const turnoStr = _TURNOS_H[_h.turnoNum]      || String(_h.turnoNum      || '—');
      const semStr   = _SEMESTRES_H[_h.semestreNum] || String(_h.semestreNum  || '—');
      const resumen  = `
        <div style="background:white;padding:14px 18px;border-radius:8px;border:1.5px solid #6A2135;
                    margin-bottom:18px;display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
                    gap:10px;font-size:0.9rem;">
          <div><strong style="color:#6A2135;">Alumno:</strong><br>${_h.alumnoNombre || '—'}</div>
          <div><strong style="color:#6A2135;">Carrera:</strong><br>${_h.carreraNombre || '—'}</div>
          <div><strong style="color:#6A2135;">Grupo:</strong><br>${_h.grupo || '—'}</div>
          <div><strong style="color:#6A2135;">Turno:</strong><br>${turnoStr}</div>
          <div><strong style="color:#6A2135;">Semestre:</strong><br>${semStr}</div>
          <div><strong style="color:#6A2135;">Promedio General:</strong><br>
            <span style="font-weight:bold;font-size:1.3rem;color:#6A2135;">${_h.promedioGeneral || '—'}</span>
          </div>
        </div>`;

      // Mostrar todos los periodos que tengan al menos un dato capturado
      const _tieneDatoInf = m => m.parcial1 != null || m.parcial2 != null || m.parcial3 != null
        || m.extraordinario != null || m.ets != null;

      // Periodos en orden cronológico (ascendente) para el informe
      const periodosAsc = Object.keys(_h.porPeriodo || {}).sort();
      let contenidoPeriodos = '';
      for (const p of periodosAsc) {
        const mats = (_h.porPeriodo[p] || []).filter(_tieneDatoInf);
        if (mats.length === 0) continue;
        contenidoPeriodos += `<h3 class="periodo-titulo">Periodo ${p}</h3>` + _construirTablaConFaltasArray(mats);
      }
      if (!contenidoPeriodos) {
        contenidoPeriodos = '<p style="color:#999;text-align:center;padding:20px;">Sin calificaciones capturadas.</p>';
      }

      vistaEl.innerHTML = pdfBtn + resumen + contenidoPeriodos;
    }

    // ── Historial Anterior: periodo previo con tabla simple + botón PDF ───────
    function _vistaHistorialAnterior() {
      const vistaEl = document.getElementById('vistaActiva');
      if (!vistaEl) return;

      const periodos = Object.keys(_h.porPeriodo || {}).sort().reverse();
      // Prioridad: periodoAnterior de config si existe en datos; sino el segundo más reciente
      const per = (_h.periodoAnterior && (_h.porPeriodo || {})[_h.periodoAnterior])
        ? _h.periodoAnterior
        : (periodos.length > 1 ? periodos[1] : null);

      if (!per) {
        vistaEl.innerHTML = '<p style="color:#999;text-align:center;padding:20px;">No hay periodo anterior con calificaciones registradas.</p>';
        return;
      }

      const nomSafe = (_h.alumnoNombre || '').replace(/\\/g, '\\\\').replace(/'/g, "\\'");
      const pdfBtn  = `<div style="text-align:right;margin-bottom:16px;">
        <button class="btn-pdf rojo" style="display:inline-block;width:auto;padding:10px 20px;"
          onclick="descargarPeriodoPDF('${_h.alumnoId}', '${nomSafe}', '${per}', true)">
          Descargar PDF (${per})
        </button></div>`;

      vistaEl.innerHTML = pdfBtn +
        `<h3 class="periodo-titulo">Periodo Anterior — ${per}</h3>` +
        _construirTablaUnPeriodo(per);
    }

    // ─────────────────────────────────────────────────────────────────────────
    const auth = firebase.auth();

    auth.onAuthStateChanged(async (user) => {
      if (!user) {
        document.getElementById('contenido').innerHTML = '<p style="color:red;text-align:center;padding:40px;">Sesión no iniciada. Cierra esta pestaña.</p>';
        return;
      }
      const snap = await db.collection('usuarios').doc(user.uid).get();
      if (!snap.exists || snap.data().rol !== 'controlEscolar') {
        document.getElementById('contenido').innerHTML = '<p style="color:red;text-align:center;padding:40px;">Sin permisos.</p>';
        return;
      }
      const params = new URLSearchParams(window.location.search);
      const alumnoId     = params.get('id')     || sessionStorage.getItem('historialAlumnoId');
      const alumnoNombre = params.get('nombre') || sessionStorage.getItem('historialAlumnoNombre') || 'Alumno';

      if (!alumnoId) {
        document.getElementById('contenido').innerHTML = '<p style="color:#666;text-align:center;padding:40px;">No se recibió información del alumno.</p>';
        return;
      }
      document.getElementById('subtitulo').textContent = alumnoNombre;
      await cargarHistorial(alumnoId, alumnoNombre);
    });

    async function cargarHistorial(alumnoId, nombreAlumno) {
      try {
        const alumnoDoc  = await db.collection('usuarios').doc(alumnoId).get();
        const alumnoData = alumnoDoc.exists ? alumnoDoc.data() : {};
        const carreraId  = alumnoData.carreraId || null;

        // Datos del alumno para tarjeta resumen del informe
        _h.alumnoId     = alumnoId;
        _h.alumnoNombre = nombreAlumno;
        _h.grupo        = alumnoData.codigoGrupo || '';
        _h.turnoNum     = alumnoData.turno       || null;
        _h.semestreNum  = alumnoData.periodo     || null;

        const [tieneEF, esMaestria, configDoc, carreraDoc] = await Promise.all([
          carreraId ? obtenerTieneExamenFinal(carreraId) : Promise.resolve(false),
          carreraId ? obtenerEsUnParcial(carreraId)      : Promise.resolve(false),
          carreraId ? db.collection('config').doc(`periodo_${carreraId}`).get()
                    : Promise.resolve({ exists: false }),
          carreraId ? db.collection('carreras').doc(carreraId).get()
                    : Promise.resolve({ exists: false })
        ]);

        _h.tieneEF      = tieneEF;
        _h.esMaestria   = esMaestria;
        _h.carreraNombre = carreraDoc.exists ? (carreraDoc.data().nombre || '') : '';
        _h.periodoActual   = configDoc.exists ? (configDoc.data().periodo         || null) : null;
        _h.periodoAnterior = configDoc.exists ? (configDoc.data().periodoAnterior  || null) : null;

        // Cabeceras para _construirTablaUnPeriodo (vista por defecto)
        if (esMaestria) {
          _h.cabeceras = `<th style="text-align:center;">Calificación</th>`;
          _h.colsBeforePromedio = 2; _h.colsAfterPromedio = 0;
        } else if (tieneEF) {
          _h.cabeceras = `
            <th style="text-align:center;">Parcial 1</th>
            <th style="text-align:center;">Parcial 2</th>
            <th style="text-align:center;">Examen Final</th>
            <th style="text-align:center;">Calificación</th>
            <th style="text-align:center;">Extraordinario</th>`;
          _h.colsBeforePromedio = 5; _h.colsAfterPromedio = 1;
        } else {
          _h.cabeceras = `
            <th style="text-align:center;">Parcial 1</th>
            <th style="text-align:center;">Parcial 2</th>
            <th style="text-align:center;">Parcial 3</th>
            <th style="text-align:center;">Promedio</th>
            <th style="text-align:center;">Extraordinario</th>
            <th style="text-align:center;">ETS</th>`;
          _h.colsBeforePromedio = 5; _h.colsAfterPromedio = 2;
        }

        const [calSnap, materiasSnap] = await Promise.all([
          db.collection('calificaciones').where('alumnoId', '==', alumnoId).get(),
          db.collection('materias').get()
        ]);

        const materiasCache = {};
        materiasSnap.forEach(d => { materiasCache[d.id] = d.data(); });

        const idSafe  = alumnoId;
        const nomSafe = nombreAlumno.replace(/\\/g, '\\\\').replace(/'/g, "\\'");
        const btnsHtml = `
          <div class="btns-pdf">
            <button class="btn-pdf rojo"  onclick="_vistaHistorialAnterior()">Historial Anterior</button>
            <button class="btn-pdf azul"  onclick="_vistaInforme()">Informe de Calificaciones</button>
            <button class="btn-pdf verde" onclick="verBoletaGlobalAlumno('${idSafe}')">Boleta Global</button>
          </div>`;

        if (calSnap.empty) {
          _h.porPeriodo      = {};
          _h.promedioGeneral = '—';
          document.getElementById('contenido').innerHTML = `
            <div class="info-card">
              <div><strong style="color:#666;">Alumno:</strong><br>${nombreAlumno}</div>
              <div><strong style="color:#666;">Total Materias:</strong><br>
                <span style="font-size:1.5rem;color:#999;font-weight:bold;">0</span></div>
              <div><strong style="color:#666;">Periodos Cursados:</strong><br>
                <span style="font-size:1.5rem;color:#999;font-weight:bold;">0</span></div>
              ${btnsHtml}
            </div>
            <div id="vistaActiva"><p style="color:#999;text-align:center;padding:20px;">
              Este alumno aún no tiene calificaciones capturadas.</p></div>`;
          return;
        }

        // Construir materiasMap incluyendo faltas
        const materiasMap = {};
        calSnap.forEach(doc => {
          const cal = doc.data();
          const key = `${cal.materiaId}_${cal.periodo}`;
          materiasMap[key] = {
            materiaNombre:  cal.materiaNombre  || materiasCache[cal.materiaId]?.nombre || 'Sin nombre',
            materiaCodigo:  cal.materiaCodigo  || materiasCache[cal.materiaId]?.codigo || '',
            periodo:        cal.periodo        || 'N/A',
            parcial1:       cal.parciales?.parcial1 ?? null,
            parcial2:       cal.parciales?.parcial2 ?? null,
            parcial3:       cal.parciales?.parcial3 ?? null,
            falta1:         cal.faltas?.falta1  ?? null,
            falta2:         cal.faltas?.falta2  ?? null,
            falta3:         cal.faltas?.falta3  ?? null,
            promedio:       cal.promedio        ?? null,
            extraordinario: cal.extraordinario  ?? null,
            ets:            cal.ets             ?? null
          };
        });

        const porPeriodo = {};
        Object.values(materiasMap).forEach(m => {
          if (!porPeriodo[m.periodo]) porPeriodo[m.periodo] = [];
          porPeriodo[m.periodo].push(m);
        });
        _h.porPeriodo = porPeriodo;
        const periodos = Object.keys(porPeriodo).sort().reverse();

        // Promedio general (sobre finales numéricas)
        const finales = Object.values(materiasMap)
          .map(m => parseFloat(m.promedio)).filter(v => !isNaN(v));
        _h.promedioGeneral = finales.length > 0
          ? (finales.reduce((a, b) => a + b, 0) / finales.length).toFixed(1) : '—';

        // Fallback de periodos si config no coincide con datos reales
        if (!_h.periodoAnterior || !porPeriodo[_h.periodoAnterior]) {
          if (periodos.length > 1) _h.periodoAnterior = periodos[1];
        }

        // Vista por defecto: solo periodo actual (excluye periodoAnterior)
        // Mostrar el periodo más reciente que tenga al menos un parcial/ETS/Extra capturado
        const _tieneDato = m => m.parcial1 != null || m.parcial2 != null || m.parcial3 != null
          || m.extraordinario != null || m.ets != null;
        let _matsActuales = [], _periodoMostrado = null;
        for (const p of periodos) { // periodos ya ordenados desc (más reciente primero)
          const mats = (porPeriodo[p] || []).filter(_tieneDato);
          if (mats.length > 0) { _matsActuales = mats; _periodoMostrado = p; break; }
        }
        const htmlPeriodos = _matsActuales.length > 0
          ? `<h3 class="periodo-titulo">Periodo Actual${_periodoMostrado ? ' — ' + _periodoMostrado : ''}</h3>`
            + _construirTablaConFaltasArray(_matsActuales)
          : '<p style="color:#999;text-align:center;padding:20px;">Sin calificaciones capturadas para el periodo actual.</p>';

        document.getElementById('contenido').innerHTML = `
          <div class="info-card">
            <div><strong style="color:#666;">Alumno:</strong><br>${nombreAlumno}</div>
            <div><strong style="color:#666;">Total Materias:</strong><br>
              <span style="font-size:1.5rem;color:#4caf50;font-weight:bold;">${Object.keys(materiasMap).length}</span></div>
            <div><strong style="color:#666;">Periodos Cursados:</strong><br>
              <span style="font-size:1.5rem;color:#6A2135;font-weight:bold;">${periodos.length}</span></div>
            ${btnsHtml}
          </div>
          <div id="vistaActiva">${htmlPeriodos}</div>`;

      } catch (err) {
        console.error(err);
        document.getElementById('contenido').innerHTML =
          '<p style="color:red;text-align:center;padding:40px;">Error al cargar el historial.</p>';
      }
    }
  </script>
</body>
</html>
