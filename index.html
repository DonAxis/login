<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Consulta de Calificaciones</title>
  <link rel="stylesheet" type="text/css" href="sice/css/modules/controlAlumnoEstilo.css">
</head>
<body>

  <div class="container">
    <!-- FORMULARIO DE CONSULTA -->
    <div id="loginCard" class="login-card">
      <h1>Consulta de Calificaciones</h1>
      <p class="subtitle">Ingresa tu matrícula y correo para consultar tus calificaciones</p>
      
      <!-- Botón logout solo si hay sesión activa -->
      <div id="sessionAlert" style="display: none; background: #fff3cd; padding: 15px; border-radius: 8px; margin-bottom: 20px; border-left: 4px solid #ffc107;">
        <p style="margin: 0 0 10px 0; color: #856404;">
          Tienes una sesión activa. Los alumnos ya no necesitan iniciar sesión.
        </p>
        <button onclick="cerrarSesion()" style="background: #dc3545; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: 600;">
          Cerrar Sesión
        </button>
      </div>

      <form id="formConsulta" onsubmit="consultarAlumno(event)">
        <div class="form-grupo">
          <label for="matricula">Matrícula:</label>
          <input type="text" id="matricula" required placeholder="Ej: 2024001" autocomplete="off">
        </div>

        <div class="form-grupo">
          <label for="email">Correo Electrónico:</label>
          <input type="email" id="email" required placeholder="tu-email@alumno.com" autocomplete="email">
        </div>

        <button type="submit" class="btn-consultar" id="btnConsultar">
          Consultar
        </button>
      </form>
    </div>

    <!-- RESULTADO -->
    <div id="resultado" class="resultado">
      <div class="info-alumno">
        <div class="info-header">
          <h2 id="nombreAlumno">Nombre del Alumno</h2>
          <div class="info-grid">
            <div class="info-item">
              <strong>Matrícula:</strong>
              <span id="infoMatricula">-</span>
            </div>
            <div class="info-item">
              <strong>Grupo:</strong>
              <span id="infoGrupo">-</span>
            </div>
            <div class="info-item">
              <strong>Carrera:</strong>
              <span id="infoCarrera">-</span>
            </div>
          </div>
        </div>

        <button onclick="nuevaConsulta()" class="btn-nuevo">Nueva Consulta</button>
        <button class="btn-horario" title="Próximamente">Ver Horario (Próximamente)</button>
      </div>
      <br>

      <!-- MATERIAS Y CALIFICACIONES -->
      <div class="seccion">
        <h3>Mis Materias</h3>
        <div id="listaMaterias"></div>
        
        <!-- Botón para generar PDF -->
        <button onclick="generarPDFBoletaActual()" 
                style="background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); color: white; border: none; padding: 12px 20px; border-radius: 10px; font-weight: 600; cursor: pointer; margin-top: 20px; display: block; width: 100%;">
          Descargar Boleta en PDF
        </button>
      </div>
    </div>
  </div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  <script src="sice/js/utils/firebase.js"></script>

  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script>
    let alumnoActual = null;
    let materiasCache = null;
    let carreraNombreCache = null;

// Detectar si hay sesión activa
firebase.auth().onAuthStateChanged((user) => {
  if (user) {
    // Hay sesión activa - mostrar alerta
    document.getElementById('sessionAlert').style.display = 'block';
  }
});

async function cerrarSesion() {
  try {
    await firebase.auth().signOut();
    alert('Sesión cerrada. Ahora puedes consultar como alumno o ir al login del staff.');
    window.location.href = 'https://ilbcontrol.mx';
  } catch (error) {
    console.error('Error:', error);
    alert('Error al cerrar sesión');
  }
}

async function consultarAlumno(event) {
  event.preventDefault();
  
  const matricula = document.getElementById('matricula').value.trim();
  const email = document.getElementById('email').value.trim().toLowerCase();
  const btnConsultar = document.getElementById('btnConsultar');
  
  btnConsultar.disabled = true;
  btnConsultar.textContent = 'Consultando...';
  
  try {
    // Verificar caché de sesión (evita releer Firestore)
    const cacheKey = `consulta_${matricula}`;
    const cached = sessionStorage.getItem(cacheKey);
    if (cached) {
      try {
        const { alumno, materias, carreraNombre, timestamp } = JSON.parse(cached);
        const TTL = 30 * 60 * 1000; // 30 minutos
        if (Date.now() - timestamp < TTL && alumno.email === email) {
          alumnoActual = alumno;
          materiasCache = materias;
          carreraNombreCache = carreraNombre;
          await mostrarInformacionAlumno();
          btnConsultar.disabled = false;
          btnConsultar.textContent = 'Consultar';
          return;
        }
      } catch(e) {
        sessionStorage.removeItem(cacheKey);
      }
    }

    console.log('Buscando alumno:', matricula, email);

    // Buscar alumno por matrícula y email
    const snapshot = await db.collection('usuarios')
      .where('rol', '==', 'alumno')
      .where('matricula', '==', matricula)
      .where('email', '==', email)
      .limit(1)
      .get();
    
    if (snapshot.empty) {
      alert('No se encontró ningún alumno con esa matrícula y correo.\n\nVerifica tus datos.');
      btnConsultar.disabled = false;
      btnConsultar.textContent = 'Consultar';
      return;
    }
    
    const doc = snapshot.docs[0];
    alumnoActual = {
      id: doc.id,
      ...doc.data()
    };
    
    console.log('Alumno encontrado:', alumnoActual);
    
    // Mostrar información
    await mostrarInformacionAlumno();
    
  } catch (error) {
    console.error('Error:', error);
    alert('Error al consultar. Intenta de nuevo.');
    btnConsultar.disabled = false;
    btnConsultar.textContent = 'Consultar';
  }
}

async function mostrarInformacionAlumno() {
  // Mostrar nombre
  document.getElementById('nombreAlumno').textContent = alumnoActual.nombre;
  document.getElementById('infoMatricula').textContent = alumnoActual.matricula;
  
  // ✓ CORREGIDO: Mostrar código de grupo o "Especial" para alumnos especiales
  if (alumnoActual.codigoGrupo) {
    document.getElementById('infoGrupo').textContent = alumnoActual.codigoGrupo;
    console.log('Código de grupo:', alumnoActual.codigoGrupo);
  } else if (alumnoActual.tipoAlumno === 'especial') {
    document.getElementById('infoGrupo').textContent = 'Especial';
    console.log('Alumno especial');
  } else {
    document.getElementById('infoGrupo').textContent = 'Sin grupo asignado';
    console.log('Alumno sin código de grupo');
  }
  
  // Cargar carrera
  if (alumnoActual.carreraId) {
    try {
      if (carreraNombreCache) {
        document.getElementById('infoCarrera').textContent = carreraNombreCache;
      } else {
        const carreraDoc = await db.collection('carreras').doc(alumnoActual.carreraId).get();
        if (carreraDoc.exists) {
          carreraNombreCache = carreraDoc.data().nombre;
          document.getElementById('infoCarrera').textContent = carreraNombreCache;
        }
      }
    } catch (error) {
      console.error('Error al cargar carrera:', error);
    }
  }
  
  // Cargar materias y calificaciones
  await cargarMateriasYCalificaciones();

  // Guardar en sessionStorage para consultas repetidas (0 lecturas Firebase)
  if (alumnoActual && materiasCache) {
    const cacheKey = `consulta_${alumnoActual.matricula}`;
    sessionStorage.setItem(cacheKey, JSON.stringify({
      alumno: alumnoActual,
      materias: materiasCache,
      carreraNombre: carreraNombreCache,
      timestamp: Date.now()
    }));
  }

  // Mostrar resultado, ocultar formulario
  document.getElementById('loginCard').style.display = 'none';
  document.getElementById('resultado').style.display = 'block';
}

async function cargarMateriasYCalificaciones() {
  const container = document.getElementById('listaMaterias');
  const tieneEF = await obtenerTieneExamenFinal(alumnoActual.carreraId || '');

  // Si ya tenemos datos en memoria, renderizar sin ir a Firestore
  if (materiasCache !== null) {
    renderizarMaterias(materiasCache, tieneEF);
    return;
  }

  // ✓ CORREGIDO: Verificar codigoGrupo en lugar de grupoId
  if (!alumnoActual.codigoGrupo) {
    container.innerHTML = '<div class="sin-datos">No estás asignado a ningún grupo.</div>';
    console.log('Alumno sin código de grupo');
    return;
  }

  try {
    console.log('Buscando materias para grupo:', alumnoActual.codigoGrupo);

    // ✓ CORREGIDO: Buscar por codigoGrupo en lugar de grupoId
    const materiasSnap = await db.collection('profesorMaterias')
      .where('codigoGrupo', '==', alumnoActual.codigoGrupo)
      .where('activa', '==', true)
      .get();

    console.log('Materias encontradas:', materiasSnap.size);

    if (materiasSnap.empty) {
      container.innerHTML = '<div class="sin-datos">Tu grupo aún no tiene materias asignadas.</div>';
      return;
    }

    // Leer todas las calificaciones en paralelo (antes era una por una)
    const materiasData = materiasSnap.docs.map(doc => doc.data());
    const calRefs = materiasData.map(m =>
      db.collection('calificaciones').doc(`${alumnoActual.id}_${m.materiaId}`)
    );
    const calDocs = await Promise.all(calRefs.map(ref => ref.get()));

    const materias = materiasData.map((materia, i) => {
      const calDoc = calDocs[i];
      let parcial1 = '-', parcial2 = '-', parcial3 = '-';
      let extraordinario = null, ets = null;
      if (calDoc.exists) {
        const data = calDoc.data();
        parcial1 = data.parciales?.parcial1 ?? '-';
        parcial2 = data.parciales?.parcial2 ?? '-';
        parcial3 = data.parciales?.parcial3 ?? '-';
        extraordinario = data.extraordinario ?? null;
        ets = data.ets ?? null;
      }
      return {
        nombre: materia.materiaNombre,
        codigo: materia.codigoGrupo,
        profesor: materia.profesorNombre,
        periodo: materia.periodo || materia.periodoAcademico || '',
        parcial1, parcial2, parcial3, extraordinario, ets
      };
    });

    console.log('Total materias procesadas:', materias.length);
    materiasCache = materias;
    renderizarMaterias(materias, tieneEF);

  } catch (error) {
    console.error('Error:', error);
    container.innerHTML = '<div class="sin-datos" style="color: red;">Error al cargar información</div>';
  }
}

function renderizarMaterias(materias, tieneEF = false) {
  const container = document.getElementById('listaMaterias');
  const labelP3 = tieneEF ? 'Examen Final' : 'Parcial 3';

  let html = `
    <div style="background: white; padding: 20px; border-radius: 10px;">
      <h3 style="color: #6A2135; margin: 0 0 20px 0; text-align: center;">Boleta de Calificaciones</h3>
      <div style="overflow-x: auto; -webkit-overflow-scrolling: touch;">
        <table style="width: 100%; min-width: ${tieneEF ? '680px' : '760px'}; border-collapse: collapse;">
        <thead>
          <tr style="background: #6A2135; color: white;">
            <th style="padding: 12px; text-align: left; border: 1px solid #ddd;">Materia</th>
            <th style="padding: 12px; text-align: center; border: 1px solid #ddd; width: 90px; min-width: 90px;">Parcial 1</th>
            <th style="padding: 12px; text-align: center; border: 1px solid #ddd; width: 90px; min-width: 90px;">Parcial 2</th>
            <th style="padding: 12px; text-align: center; border: 1px solid #ddd; width: 90px; min-width: 90px;">${labelP3}</th>
            <th style="padding: 12px; text-align: center; border: 1px solid #ddd; width: 90px; min-width: 90px;">Calificación</th>
            <th style="padding: 12px; text-align: center; border: 1px solid #ddd; width: 90px; min-width: 90px;">Extra.</th>
            ${!tieneEF ? `<th style="padding: 12px; text-align: center; border: 1px solid #ddd; width: 80px; min-width: 80px;">ETS</th>` : ''}
          </tr>
        </thead>
        <tbody>
  `;

  materias.forEach(materia => {
    const toN = v => (v !== '-' && v !== null && v !== undefined) ? (v === 'NP' ? 'NP' : parseFloat(v)) : null;
    const calNum = calcularCalificacion(toN(materia.parcial1), toN(materia.parcial2), toN(materia.parcial3), tieneEF);
    const promedio = calNum === null ? '-' : (calNum === 'NP' ? 'NP' : calNum.toFixed(1));

    html += `
      <tr style="border-bottom: 1px solid #eee;">
        <td style="padding: 12px; border: 1px solid #ddd;">
          <strong>${materia.nombre}</strong>
          <br><small style="color: #666;">Profesor: ${materia.profesor}</small>
        </td>
        <td style="padding: 12px; text-align: center; border: 1px solid #ddd; font-size: 1.2rem; font-weight: bold; color: ${materia.parcial1 === 'NP' ? '#a60d24' : '#000000'};">
          ${materia.parcial1}
        </td>
        <td style="padding: 12px; text-align: center; border: 1px solid #ddd; font-size: 1.2rem; font-weight: bold; color: ${materia.parcial2 === 'NP' ? '#a60d24' : '#000000'};">
          ${materia.parcial2}
        </td>
        <td style="padding: 12px; text-align: center; border: 1px solid #ddd; font-size: 1.2rem; font-weight: bold; color: ${materia.parcial3 === 'NP' ? '#a60d24' : '#000000'};">
          ${materia.parcial3}
        </td>
        <td style="padding: 12px; text-align: center; border: 1px solid #ddd; font-size: 1.3rem; font-weight: bold; background: #f0f7ff; color: #6A2135;">
          ${promedio}
        </td>
        <td style="padding: 12px; text-align: center; border: 1px solid #ddd; font-size: 1.1rem; font-weight: bold; color: ${materia.extraordinario !== null ? '#4caf50' : '#999'};">
          ${materia.extraordinario !== null ? materia.extraordinario : '-'}
        </td>
        ${!tieneEF ? `<td style="padding: 12px; text-align: center; border: 1px solid #ddd; font-size: 1.1rem; font-weight: bold; color: ${materia.ets !== null ? '#4caf50' : '#999'};">
          ${materia.ets !== null ? materia.ets : '-'}
        </td>` : ''}
      </tr>
    `;
  });

  html += `
        </tbody>
        </table>
      </div>
      <p style="text-align: center; color: #999; font-size: 0.85rem; margin-top: 10px;">
        Desliza para ver todo el contenido si estás en un dispositivo móvil.
      </p>
    </div>
  `;

  container.innerHTML = html;
}

function nuevaConsulta() {
  document.getElementById('loginCard').style.display = 'block';
  document.getElementById('resultado').style.display = 'none';
  document.getElementById('formConsulta').reset();
  document.getElementById('btnConsultar').disabled = false;
  document.getElementById('btnConsultar').textContent = 'Consultar';
  alumnoActual = null;
  materiasCache = null;
  carreraNombreCache = null;
}
  </script>

</body>
